<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c6fe0"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
  </defs>
  <!-- 背景 -->
  <rect width="192" height="192" rx="42" fill="url(#bg)"/>
  <!-- 四象限色块 -->
  <rect x="20" y="20" width="70" height="70" rx="14" fill="#1e7e34" opacity="0.85"/>
  <rect x="102" y="20" width="70" height="70" rx="14" fill="#c0392b" opacity="0.85"/>
  <rect x="20" y="102" width="70" height="70" rx="14" fill="#1a5276" opacity="0.85"/>
  <rect x="102" y="102" width="70" height="70" rx="14" fill="#d35400" opacity="0.85"/>
  <!-- 中心圆 -->
  <circle cx="96" cy="96" r="18" fill="url(#accent)" opacity="0.95"/>
  <!-- 中心时钟图标 -->
  <text x="96" y="104" text-anchor="middle" font-size="20" fill="white">⏰</text>
  <!-- 十字线 -->
  <rect x="90" y="20" width="12" height="152" rx="3" fill="rgba(255,255,255,0.15)"/>
  <rect x="20" y="90" width="152" height="12" rx="3" fill="rgba(255,255,255,0.15)"/>
</svg>
