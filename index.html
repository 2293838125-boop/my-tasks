<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>时间管理四象限</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; background: #1a1a2e; min-height: 100vh; min-height: 100dvh; overflow: hidden; }
        .container { width: 100vw; height: 100vh; height: 100dvh; display: flex; flex-direction: column; }
        .header { text-align: center; color: white; padding: 10px 15px; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); flex-shrink: 0; display: flex; justify-content: space-between; align-items: center; }
        .header-left h1 { font-size: 1.1rem; font-weight: 600; }
        .header-left p { font-size: 0.65rem; opacity: 0.6; margin-top: 1px; }
        .header-stats { display: flex; gap: 15px; }
        .header-stat { text-align: center; }
        .header-stat .num { font-size: 1.3rem; font-weight: 700; }
        .header-stat .label { font-size: 0.6rem; opacity: 0.7; }
        .matrix-area { flex: 1; display: grid; grid-template-columns: auto 1fr auto; grid-template-rows: auto 1fr auto; padding: 8px; gap: 4px; overflow: hidden; }
        .axis-label { display: flex; align-items: center; justify-content: center; font-size: 0.85rem; font-weight: 700; letter-spacing: 3px; white-space: nowrap; }
        .axis-top { grid-column: 2; grid-row: 1; padding-bottom: 4px; color: #ff6b6b; text-shadow: 0 0 10px rgba(255, 107, 107, 0.5); }
        .axis-bottom { grid-column: 2; grid-row: 3; padding-top: 4px; color: #74c0fc; text-shadow: 0 0 10px rgba(116, 192, 252, 0.5); }
        .axis-left { grid-column: 1; grid-row: 2; writing-mode: vertical-lr; padding-right: 6px; color: #51cf66; text-shadow: 0 0 10px rgba(81, 207, 102, 0.5); }
        .axis-right { grid-column: 3; grid-row: 2; writing-mode: vertical-rl; padding-left: 6px; color: #ffd43b; text-shadow: 0 0 10px rgba(255, 212, 59, 0.5); }
        .matrix-grid { grid-column: 2; grid-row: 2; display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; gap: 5px; position: relative; border: 2px solid rgba(255,255,255,0.3); border-radius: 12px; background: rgba(255,255,255,0.03); }
        .axis-lines { position: absolute; top: 0; left: 0; right: 0; bottom: 0; pointer-events: none; z-index: 1; }
        .axis-lines::before, .axis-lines::after { content: ''; position: absolute; background: rgba(255,255,255,0.4); }
        .axis-lines::before { width: 100%; height: 3px; top: 50%; left: 0; transform: translateY(-50%); }
        .axis-lines::after { width: 3px; height: 100%; left: 50%; top: 0; transform: translateX(-50%); }
        .axis-arrow { position: absolute; z-index: 2; width: 0; height: 0; }
        .axis-arrow.top { top: -2px; left: 50%; transform: translateX(-50%); border-left: 8px solid transparent; border-right: 8px solid transparent; border-bottom: 10px solid rgba(255,255,255,0.6); }
        .axis-arrow.right { right: -2px; top: 50%; transform: translateY(-50%); border-top: 8px solid transparent; border-bottom: 8px solid transparent; border-left: 10px solid rgba(255,255,255,0.6); }
        .axis-center { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 34px; height: 34px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; box-shadow: 0 0 16px rgba(102, 126, 234, 0.5); z-index: 10; }
        .quadrant { border-radius: 10px; display: flex; flex-direction: column; overflow: hidden; margin: 3px; }
        .q2 { background: linear-gradient(135deg, #2d6a4f 0%, #40916c 100%); }
        .q1 { background: linear-gradient(135deg, #9d0208 0%, #d00000 100%); }
        .q4 { background: linear-gradient(135deg, #185adb 0%, #2b7a78 100%); }
        .q3 { background: linear-gradient(135deg, #e85d04 0%, #f48c06 100%); }
        .quadrant-header { padding: 8px 10px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .quadrant-title { display: flex; align-items: center; gap: 6px; }
        .quadrant-icon { width: 26px; height: 26px; background: rgba(255,255,255,0.2); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.95rem; }
        .quadrant-info h3 { color: white; font-size: 0.75rem; font-weight: 600; }
        .quadrant-info span { color: rgba(255,255,255,0.75); font-size: 0.55rem; }
        .task-count { background: rgba(255,255,255,0.2); color: white; padding: 2px 7px; border-radius: 10px; font-size: 0.7rem; font-weight: 600; min-width: 22px; text-align: center; }
        .task-list { flex: 1; overflow-y: auto; padding: 0 6px 6px; -webkit-overflow-scrolling: touch; }
        .task-list::-webkit-scrollbar { width: 2px; }
        .task-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
        .task-item { display: flex; align-items: center; gap: 6px; padding: 8px 9px; margin-bottom: 4px; background: rgba(255,255,255,0.95); border-radius: 9px; transition: all 0.2s; animation: slideIn 0.25s ease; position: relative; }
        @keyframes slideIn { from { opacity: 0; transform: translateY(-6px) scale(0.96); } to { opacity: 1; transform: translateY(0) scale(1); } }
        @keyframes taskDone { 0% { transform: scale(1); } 30% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 0.7; } }
        .task-item.just-completed { animation: taskDone 0.4s ease; }
        .task-item.completed { opacity: 0.7; background: rgba(255,255,255,0.65); }
        .task-item.completed .task-text { text-decoration: line-through; color: #868e96; }
        .task-checkbox { width: 18px; height: 18px; border: 2px solid #dee2e6; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
        .task-checkbox.checked { background: #51cf66; border-color: #51cf66; }
        .task-checkbox.checked::after { content: '✓'; color: white; font-size: 10px; font-weight: bold; }
        .task-text { flex: 1; font-size: 0.75rem; color: #343a40; word-break: break-word; line-height: 1.4; cursor: pointer; }
        .task-delete { width: 22px; height: 22px; border: none; background: transparent; color: #adb5bd; cursor: pointer; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; transition: all 0.15s; opacity: 0.5; flex-shrink: 0; }
        .task-delete:active { background: #ffe3e3; color: #fa5252; opacity: 1; }
        .add-task { padding: 5px 6px; display: flex; gap: 4px; background: rgba(0,0,0,0.1); flex-shrink: 0; }
        .add-task input { flex: 1; padding: 8px 10px; border: none; border-radius: 7px; font-size: 0.75rem; outline: none; background: rgba(255,255,255,0.95); }
        .add-task input::placeholder { color: #adb5bd; }
        .add-btn { width: 32px; height: 32px; background: rgba(255,255,255,0.9); color: #495057; border: none; border-radius: 7px; cursor: pointer; font-size: 1.1rem; font-weight: 300; transition: all 0.2s; display: flex; align-items: center; justify-content: center; }
        .add-btn:active { transform: scale(0.9); background: white; }
        .empty-state { text-align: center; padding: 12px 6px; color: rgba(255,255,255,0.5); }
        .empty-state-icon { font-size: 1.6rem; margin-bottom: 3px; opacity: 0.5; }
        .empty-state p { font-size: 0.65rem; }
        .toolbar { display: flex; justify-content: space-between; align-items: center; padding: 8px 15px; background: rgba(0,0,0,0.3); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); flex-shrink: 0; }
        .toolbar-btn { padding: 7px 12px; background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8); border: 1px solid rgba(255,255,255,0.12); border-radius: 8px; cursor: pointer; font-size: 0.7rem; display: flex; align-items: center; gap: 4px; transition: all 0.2s; }
        .toolbar-btn:active { background: rgba(255,255,255,0.15); }
        .toolbar-btn.danger:active { background: rgba(255,0,0,0.2); border-color: rgba(255,0,0,0.4); }
        .toast { position: fixed; bottom: 70px; left: 50%; transform: translateX(-50%) translateY(100px); background: rgba(0,0,0,0.85); color: white; padding: 10px 20px; border-radius: 20px; font-size: 0.8rem; opacity: 0; transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55); z-index: 1000; pointer-events: none; white-space: nowrap; }
        .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
        .modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.6); display: flex; align-items: center; justify-content: center; z-index: 100; opacity: 0; visibility: hidden; transition: all 0.2s; padding: 20px; }
        .modal-overlay.show { opacity: 1; visibility: visible; }
        .modal { background: white; border-radius: 16px; padding: 20px; width: 100%; max-width: 320px; transform: scale(0.9); transition: transform 0.2s; }
        .modal-overlay.show .modal { transform: scale(1); }
        .modal h3 { font-size: 1rem; margin-bottom: 14px; color: #343a40; }
        .modal input { width: 100%; padding: 12px 14px; border: 2px solid #e9ecef; border-radius: 10px; font-size: 0.95rem; outline: none; margin-bottom: 14px; transition: border-color 0.2s; }
        .modal input:focus { border-color: #667eea; }
        .modal-actions { display: flex; gap: 8px; }
        .modal-btn { flex: 1; padding: 11px; border: none; border-radius: 10px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.2s; }
        .modal-btn:active { transform: scale(0.98); }
        .modal-btn.cancel { background: #f1f3f5; color: #495057; }
        .modal-btn.confirm { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .modal-btn.danger-confirm { background: #fa5252; color: white; }
        @media (max-width: 400px) { .quadrant-info span { display: none; } .task-text { font-size: 0.7rem; } .header-left h1 { font-size: 1rem; } .axis-label { font-size: 0.75rem; } }
        @media (max-height: 600px) { .quadrant-icon { width: 22px; height: 22px; font-size: 0.8rem; } .quadrant-header { padding: 5px 8px; } .empty-state { padding: 6px; } .empty-state-icon { font-size: 1.2rem; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-left">
                <h1>⏰ 时间管理四象限</h1>
                <p>科学规划，高效执行</p>
            </div>
            <div class="header-stats">
                <div class="header-stat">
                    <div class="num" id="pending-tasks">0</div>
                    <div class="label">待完成</div>
                </div>
                <div class="header-stat">
                    <div class="num" id="completed-tasks">0</div>
                    <div class="label">已完成</div>
                </div>
            </div>
        </div>
        <div class="matrix-area">
            <div class="axis-label axis-top">重 要</div>
            <div class="axis-label axis-left">不紧急</div>
            <div class="matrix-grid">
                <div class="axis-lines">
                    <div class="axis-arrow top"></div>
                    <div class="axis-arrow right"></div>
                </div>
                <div class="axis-center">⏱️</div>
                <div class="quadrant q2">
                    <div class="quadrant-header">
                        <div class="quadrant-title">
                            <div class="quadrant-icon">🎯</div>
                            <div class="quadrant-info">
                                <h3>重要 · 不紧急</h3>
                                <span>计划做，投资未来</span>
                            </div>
                        </div>
                        <span class="task-count" id="count-q2">0</span>
                    </div>
                    <div class="task-list" id="list-q2"></div>
                    <div class="add-task">
                        <input type="text" id="input-q2" placeholder="添加任务..." onkeypress="handleEnter(event, 'q2')">
                        <button class="add-btn" onclick="addTask('q2')">+</button>
                    </div>
                </div>
                <div class="quadrant q1">
                    <div class="quadrant-header">
                        <div class="quadrant-title">
                            <div class="quadrant-icon">🔥</div>
                            <div class="quadrant-info">
                                <h3>重要 · 紧急</h3>
                                <span>立即做，刻不容缓</span>
                            </div>
                        </div>
                        <span class="task-count" id="count-q1">0</span>
                    </div>
                    <div class="task-list" id="list-q1"></div>
                    <div class="add-task">
                        <input type="text" id="input-q1" placeholder="添加任务..." onkeypress="handleEnter(event, 'q1')">
                        <button class="add-btn" onclick="addTask('q1')">+</button>
                    </div>
                </div>
                <div class="quadrant q4">
                    <div class="quadrant-header">
                        <div class="quadrant-title">
                            <div class="quadrant-icon">☕</div>
                            <div class="quadrant-info">
                                <h3>不重要 · 不紧急</h3>
                                <span>尽量不做，浪费时间</span>
                            </div>
                        </div>
                        <span class="task-count" id="count-q4">0</span>
                    </div>
                    <div class="task-list" id="list-q4"></div>
                    <div class="add-task">
                        <input type="text" id="input-q4" placeholder="添加任务..." onkeypress="handleEnter(event, 'q4')">
                        <button class="add-btn" onclick="addTask('q4')">+</button>
                    </div>
                </div>
                <div class="quadrant q3">
                    <div class="quadrant-header">
                        <div class="quadrant-title">
                            <div class="quadrant-icon">⚡</div>
                            <div class="quadrant-info">
                                <h3>紧急 · 不重要</h3>
                                <span>委托做，减少干扰</span>
                            </div>
                        </div>
                        <span class="task-count" id="count-q3">0</span>
                    </div>
                    <div class="task-list" id="list-q3"></div>
                    <div class="add-task">
                        <input type="text" id="input-q3" placeholder="添加任务..." onkeypress="handleEnter(event, 'q3')">
                        <button class="add-btn" onclick="addTask('q3')">+</button>
                    </div>
                </div>
            </div>
            <div class="axis-label axis-right">紧急</div>
            <div class="axis-label axis-bottom">不重要</div>
        </div>
        <div class="toolbar">
            <button class="toolbar-btn" onclick="showTips()">💡 使用技巧</button>
            <button class="toolbar-btn danger" onclick="clearCompleted()">🗑️ 清除已完成</button>
        </div>
    </div>
    <div class="modal-overlay" id="editModal">
        <div class="modal">
            <h3>✏️ 编辑任务</h3>
            <input type="text" id="editInput" placeholder="任务内容..." onkeypress="if(event.key==='Enter')saveEdit()">
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeEditModal()">取消</button>
                <button class="modal-btn confirm" onclick="saveEdit()">保存</button>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <h3>⚠️ 确认删除</h3>
            <p style="font-size:0.9rem;color:#868e96;margin-bottom:16px;">删除后无法恢复，确定要删除吗？</p>
            <div class="modal-actions">
                <button class="modal-btn cancel" onclick="closeDeleteModal()">取消</button>
                <button class="modal-btn danger-confirm" onclick="confirmDelete()">删除</button>
            </div>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        let tasks = JSON.parse(localStorage.getItem('eisenhowerTasks')) || { q1: [], q2: [], q3: [], q4: [] };
        let currentTask = null, currentQuadrant = null, pendingDeleteTaskId = null;
        function saveTasks() { localStorage.setItem('eisenhowerTasks', JSON.stringify(tasks)); updateStats(); }
        function showToast(message) { const toast = document.getElementById('toast'); toast.textContent = message; toast.classList.add('show'); clearTimeout(toast._timer); toast._timer = setTimeout(() => toast.classList.remove('show'), 2000); }
        function addTask(quadrant) { const input = document.getElementById(`input-${quadrant}`); const text = input.value.trim(); if (!text) { showToast('请输入任务内容'); input.focus(); return; } tasks[quadrant].unshift({ id: Date.now(), text: text, completed: false, createdAt: new Date().toISOString() }); saveTasks(); renderTasks(); input.value = ''; showToast('✓ 已添加'); }
        function handleEnter(event, quadrant) { if (event.key === 'Enter') addTask(quadrant); }
        function toggleTask(quadrant, taskId) { const task = tasks[quadrant].find(t => t.id === taskId); if (task) { task.completed = !task.completed; saveTasks(); renderTasks(); showToast(task.completed ? '🎉 已完成' : '↩ 已恢复'); if (task.completed) { const el = document.querySelector(`.task-item[data-id="${taskId}"]`); if (el) el.classList.add('just-completed'); } } }
        function openEditModal(quadrant, taskId) { const task = tasks[quadrant].find(t => t.id === taskId); if (task) { currentTask = task; currentQuadrant = quadrant; document.getElementById('editInput').value = task.text; document.getElementById('editModal').classList.add('show'); setTimeout(() => document.getElementById('editInput').focus(), 100); } }
        function closeEditModal() { document.getElementById('editModal').classList.remove('show'); currentTask = null; currentQuadrant = null; }
        function saveEdit() { const newText = document.getElementById('editInput').value.trim(); if (currentTask &amp;&amp; newText) { currentTask.text = newText; saveTasks(); renderTasks(); showToast('✓ 已保存'); closeEditModal(); } else { showToast('请输入任务内容'); } }
        function openDeleteModal(quadrant, taskId) { pendingDeleteTaskId = taskId; currentQuadrant = quadrant; document.getElementById('deleteModal').classList.add('show'); }
        function closeDeleteModal() { document.getElementById('deleteModal').classList.remove('show'); pendingDeleteTaskId = null; currentQuadrant = null; }
        function confirmDelete() { if (pendingDeleteTaskId &amp;&amp; currentQuadrant) { tasks[currentQuadrant] = tasks[currentQuadrant].filter(t => t.id !== pendingDeleteTaskId); saveTasks(); renderTasks(); showToast('🗑 已删除'); } closeDeleteModal(); }
        function renderTasks() { const quadrants = ['q1', 'q2', 'q3', 'q4']; const icons = { q1: '🔥', q2: '🎯', q3: '⚡', q4: '☕' }; quadrants.forEach(q => { const listEl = document.getElementById(`list-${q}`); const countEl = document.getElementById(`count-${q}`); const quadrantTasks = tasks[q]; countEl.textContent = quadrantTasks.length; if (quadrantTasks.length === 0) { listEl.innerHTML = `<div class="empty-state"><div class="empty-state-icon">${icons[q]}</div><p>点击下方添加任务</p></div>`; } else { listEl.innerHTML = quadrantTasks.map(task => `<div class="task-item ${task.completed ? 'completed' : ''}" data-id="${task.id}"><div class="task-checkbox ${task.completed ? 'checked' : ''}" onclick="event.stopPropagation(); toggleTask('${q}', ${task.id})"></div><span class="task-text" onclick="event.stopPropagation(); openEditModal('${q}', ${task.id})">${escapeHtml(task.text)}</span><button class="task-delete" onclick="event.stopPropagation(); openDeleteModal('${q}', ${task.id})">🗑</button></div>`).join(''); } }); }
        function updateStats() { let total = 0, completed = 0; Object.values(tasks).forEach(q => { total += q.length; completed += q.filter(t => t.completed).length; }); document.getElementById('pending-tasks').textContent = total - completed; document.getElementById('completed-tasks').textContent = completed; }
        function clearCompleted() { let count = 0; Object.keys(tasks).forEach(q => { const before = tasks[q].length; tasks[q] = tasks[q].filter(t => !t.completed); count += before - tasks[q].length; }); if (count > 0) { saveTasks(); renderTasks(); showToast(`🗑 已清除 ${count} 个任务`); } else { showToast('没有已完成的任务'); } }
        function showTips() { alert(`💡 使用技巧：\n\n• 点击任务文字 → 直接编辑内容\n• 点击左侧圆圈 → 标记完成/恢复\n• 点击右侧🗑 → 删除任务\n• 数据自动保存在浏览器中\n\n📌 四象限法则：\n• 重要·紧急 → 立即做\n• 重要·不紧急 → 计划做\n• 紧急·不重要 → 委托做\n• 不重要·不紧急 → 不做\n\n💡 核心建议：把精力放在「重要·不紧急」的事项上！`); }
        function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        document.getElementById('editModal').addEventListener('click', function(e) { if (e.target === this) closeEditModal(); });
        document.getElementById('deleteModal').addEventListener('click', function(e) { if (e.target === this) closeDeleteModal(); });
        renderTasks(); updateStats();
    </script>
</body>
</html>
